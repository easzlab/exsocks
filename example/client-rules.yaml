# 客户端源地址白名单配置
#
# 只有在此列表中的 IP/CIDR 才允许连接代理服务器，其余全部拒绝。
# 列表为空时拒绝所有连接（符合最小权限原则）。
#
# 支持 IPv4 和 IPv6 CIDR 格式：
#   - 10.0.0.0/8        内网 A 类地址段
#   - 192.168.0.0/16    内网 C 类地址段
#   - 127.0.0.1/32      本机回环地址（精确匹配）
#   - 2001:db8::/32     IPv6 地址段
#
# 此文件支持热加载，修改后自动生效，无需重启服务。
# 需要在 server.yaml 中设置 access_enabled: true 才会生效。

client_rules:
  - 10.0.0.0/8
  - 192.168.0.0/16
  - 127.0.0.1/32
