# exsocks 服务器配置示例
# 
# 配置文件加载优先级（后加载的覆盖先加载的）：
#   1. 系统配置: ~/.config/exsocks/server.yaml (Linux/macOS)
#   2. 当前目录: ./config/server.yaml
#   3. 命令行指定: --config <path>
#   4. 环境变量: EXSOCKS_* (如 EXSOCKS_BIND, EXSOCKS_MAX_CONNECTIONS)
#
# 所有配置项都有默认值，可以只配置需要修改的项

# 服务器监听地址
# 格式: IP:PORT
# 默认: 127.0.0.1:1080
bind: "0.0.0.0:1080"

# 最大并发连接数
# 超过此限制的新连接将被拒绝
# 默认: 1024
max_connections: 2048

# 连接目标的超时时间（秒）
# 如果目标主机在此时间内未响应，连接将被中断
# 默认: 10
connect_timeout: 10

# 日志文件目录
# 日志文件按天滚动，格式: exsocks.YYYY-MM-DD.log
# 默认: ./logs
log_dir: "/var/log/exsocks"

# 日志级别
# 可选值: trace, debug, info, warn, error
# 也可通过环境变量 RUST_LOG 设置更细粒度的级别
# 默认: info
log_level: "info"
