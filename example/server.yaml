# exsocks 服务器配置示例
# 
# 配置文件加载优先级（后加载的覆盖先加载的）：
#   1. 系统配置: ~/.config/exsocks/server.yaml (Linux/macOS)
#   2. 当前目录: ./config/server.yaml
#   3. 命令行指定: --config <path>
#   4. 环境变量: EXSOCKS_* (如 EXSOCKS_BIND, EXSOCKS_MAX_CONNECTIONS)
#
# 所有配置项都有默认值，可以只配置需要修改的项

# 服务器监听地址
# 格式: IP:PORT
# 默认: 127.0.0.1:1080
bind: "0.0.0.0:1080"

# 最大并发连接数
# 超过此限制的新连接将被拒绝
# 默认: 1024
max_connections: 2048

# 连接目标的超时时间（秒）
# 如果目标主机在此时间内未响应，连接将被中断
# 默认: 10
connect_timeout: 10

# 日志文件目录
# 日志文件按天滚动，格式: exsocks.YYYY-MM-DD.log
# 默认: ./logs
log_dir: "/var/log/exsocks"

# 日志级别
# 可选值: trace, debug, info, warn, error
# 也可通过环境变量 RUST_LOG 设置更细粒度的级别
# 默认: info
log_level: "info"

# 转发缓冲区大小（字节）
# 用于 client <-> target 之间的数据转发
# 较大的缓冲区可减少系统调用次数，提升大数据传输吞吐量
# 建议范围: 16384 (16KB) ~ 262144 (256KB)
# 默认: 65536 (64KB)
relay_buffer_size: 65536

# DNS 缓存 TTL（秒）
# 域名解析结果的缓存时间，避免高频域名的重复 DNS 查询
# 设置为 0 可禁用 DNS 缓存
# 默认: 300 (5分钟)
dns_cache_ttl: 300

# DNS 缓存最大条目数
# 缓存的最大域名数量，超限时惰性淘汰过期条目
# 默认: 1024
dns_cache_max_entries: 1024

# DNS 负缓存 TTL（秒）
# 域名解析失败时缓存失败结果的时间，避免短时间内对同一不可达域名反复发起 DNS 查询
# 设置为 0 可禁用负缓存（每次都重新尝试解析）
# 默认: 30
dns_cache_negative_ttl: 30

# 缓冲区对象池容量
# relay 双向转发使用的 Vec<u8> 缓冲区对象池最大容量
# 设置为 0 时自动使用 max_connections * 2
# 池中缓冲区可被连接复用，减少高频短连接场景下的堆分配开销
# 默认: 0（自动推导）
# relay_pool_capacity: 0
