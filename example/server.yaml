# exsocks 服务器配置示例
# 
# 配置文件加载优先级（后加载的覆盖先加载的）：
#   1. 系统配置: ~/.config/exsocks/server.yaml (Linux/macOS)
#   2. 当前目录: ./config/server.yaml
#   3. 命令行指定: --config <path>
#   4. 环境变量: EXSOCKS_* (如 EXSOCKS_BIND)
#
# 所有配置项都有默认值，可以只配置需要修改的项

# 服务器监听地址
# 格式: IP:PORT
# 默认: 127.0.0.1:1080
bind: "0.0.0.0:1080"

# 连接目标的超时时间（秒）
# 如果目标主机在此时间内未响应，连接将被中断
# 默认: 10
connect_timeout: 5

# 日志文件目录
# 日志文件按天滚动，格式: exsocks.YYYY-MM-DD.log
# 默认: ./logs
log_dir: "./logs"

# 日志级别
# 可选值: trace, debug, info, warn, error
# 也可通过环境变量 RUST_LOG 设置更细粒度的级别
# 默认: info
log_level: "info"

# 日志最大保留文件数
# 按天滚动时相当于保留最近 N 天的日志，超出数量的旧日志文件会被自动删除
# 默认: 7
log_max_files: 7

# 单个日志文件最大大小（字节）
# 与按天滚动同时生效，任一条件满足即触发滚动
# 设置为 0 表示不限制文件大小，仅按天滚动
# 示例: 104857600 = 100MB, 52428800 = 50MB
# 默认: 0（不限制）
log_max_size: 104857600

# 转发缓冲区大小（字节）
# 用于 client <-> target 之间的数据转发
# 较大的缓冲区可减少系统调用次数，提升大数据传输吞吐量
# 建议范围: 16384 (16KB) ~ 262144 (256KB)
# 默认: 65536 (64KB)
relay_buffer_size: 65536

# DNS 缓存 TTL（秒）
# 域名解析结果的缓存时间，避免高频域名的重复 DNS 查询
# 设置为 0 可禁用 DNS 缓存
# 默认: 300 (5分钟)
dns_cache_ttl: 300

# DNS 缓存最大条目数
# 缓存的最大域名数量，超限时惰性淘汰过期条目
# 默认: 1024
dns_cache_max_entries: 1024

# DNS 负缓存 TTL（秒）
# 域名解析失败时缓存失败结果的时间，避免短时间内对同一不可达域名反复发起 DNS 查询
# 设置为 0 可禁用负缓存（每次都重新尝试解析）
# 默认: 30
dns_cache_negative_ttl: 30

# ========== 认证配置 ==========

# 是否启用用户名/密码认证（RFC1929）
# 启用后，客户端必须提供有效的用户名和密码才能使用代理
# 未启用时，服务器同时接受无认证和用户名密码认证，但不校验凭证
# 默认: false
auth_enabled: false

# 用户认证配置文件路径
# 支持相对路径（相对于工作目录）和绝对路径
# 该文件支持热加载，修改后自动生效，无需重启服务
# 仅在 auth_enabled 为 true 时生效
# 默认: "user.yaml"
auth_user_file: "user.yaml"

# ========== 客户端源地址白名单配置 ==========

# 是否启用客户端源地址白名单
# 启用后，只有在 access_file 中配置的 CIDR 范围内的客户端 IP 才允许连接
# 白名单为空时拒绝所有连接（符合最小权限原则）
# 默认: false
access_enabled: false

# 客户端白名单配置文件路径
# 支持相对路径（相对于工作目录）和绝对路径
# 该文件支持热加载，修改后自动生效，无需重启服务
# 仅在 access_enabled 为 true 时生效
# 默认: "client-rules.yaml"
access_file: "client-rules.yaml"

# ========== 目标地址规则管控配置 ==========

# 是否启用目标地址规则管控
# 启用后，根据配置的规则对目标地址（IP/域名）和端口进行匹配检查，决定放行或阻止
# 规则合并逻辑：dynamic 规则优先级高于 static 规则（first-match-wins）
# 未命中任何规则时默认阻止（BLOCK），必须显式配置 PASS 规则才能允许连接
# 默认: false
target_rules_enabled: false

# 动态目标地址规则配置文件路径（用户自定义，高优先级）
# 由用户手动配置自定义规则，优先级高于静态规则
# 支持相对路径（相对于工作目录）和绝对路径
# 该文件支持热加载，修改后自动生效，无需重启服务
# 仅在 target_rules_enabled 为 true 时生效
# 默认: "dynamic-target-rules.yaml"
dynamic_target_rules_file: "dynamic-target-rules.yaml"

# 静态目标地址规则配置文件路径（外部接口拉取，低优先级）
# 由代理服务器定期向外部接口请求后自动生成，优先级低于动态规则
# 该文件支持热加载，修改后自动生效，无需重启服务
# 仅在 target_rules_enabled 为 true 时生效
# ⚠️ 启用远程拉取后，此文件内容将被拉取结果完全覆盖，不要手动编辑
# 默认: "static-target-rules.yaml"
static_target_rules_file: "static-target-rules.yaml"

# 是否启用定期从外部接口拉取静态规则
# 启用后将定期请求 static_target_rules_fetch_url 获取 ACL 数据
# 并自动生成/更新 static_target_rules_file
# 默认: false
static_target_rules_fetch_enabled: false

# 静态规则拉取接口 URL
# 仅在 static_target_rules_fetch_enabled 为 true 时生效
# 接口需返回 JSON 格式的 ACL 数据，格式示例：
#   {"data":{"netacl":{"BlockDomains":[...],"PassDomains":[...],"BlockIPs":[...],"PassIPs":[...]}}}
# 默认: ""
static_target_rules_fetch_url: "http://127.0.0.1:8000/acl"

# 静态规则拉取间隔（秒）
# 仅在 static_target_rules_fetch_enabled 为 true 时生效
# 默认: 36000 (10小时)
static_target_rules_fetch_interval: 36000

# ========== Prometheus Metrics 配置 ==========

# 是否启用 Prometheus metrics 端点
# 启用后在 metrics_bind 地址暴露 /metrics HTTP 端点供 Prometheus 抓取
# 所有指标操作均为无锁原子操作，对代理性能几乎无影响
# 默认: false
metrics_enabled: false

# Metrics HTTP 端点绑定地址
# 仅在 metrics_enabled 为 true 时生效
# Prometheus 抓取配置示例：
#   scrape_configs:
#     - job_name: 'exsocks'
#       static_configs:
#         - targets: ['127.0.0.1:9090']
# 默认: "127.0.0.1:9090"
metrics_bind: "127.0.0.1:9090"
