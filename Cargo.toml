[package]
name = "exsocks"
version = "0.2.3"
edition = "2024"

[dependencies]
tokio = { version = "1", features = ["full"] }
clap = { version = "4", features = ["derive"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
tracing-appender = "0.2"
thiserror = "2"
bytes = "1"
serde = { version = "1", features = ["derive"] }
config = "0.15"
dirs = "6"
tokio-util = "0.7"

[dev-dependencies]
tokio-test = "0.4"
tempfile = "3"
tokio-util = "0.7"
