name: Build and Release Rust Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  BINARY_NAME: exsocks
  # Extract version from tag (e.g. v1.0.0 -> v1.0.0)
  VERSION: ${{ github.ref_name || 'dev' }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu

          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu

          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            static: true

          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            static: true

          - os: macos-latest
            target: x86_64-apple-darwin

          - os: macos-latest
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux ARM64 linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Configure linker for Linux ARM64
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-gnu]\nlinker = "aarch64-linux-gnu-gcc"\n' >> .cargo/config.toml

      - name: Install musl tools
        if: matrix.static
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-musl" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu musl-dev
            # Install aarch64 musl cross-compiler
            MUSL_ARCHIVE="aarch64-unknown-linux-musl.tar.xz"
            MUSL_URL="https://github.com/cross-tools/musl-cross/releases/download/20250929/${MUSL_ARCHIVE}"
            echo "Downloading: ${MUSL_URL}"
            for attempt in 1 2 3; do
              echo "  Attempt ${attempt}..."
              if curl -fsSL --connect-timeout 30 --retry 2 --retry-delay 5 -o "/tmp/${MUSL_ARCHIVE}" "${MUSL_URL}"; then
                break
              fi
              if [ "${attempt}" -eq 3 ]; then
                echo "::error::Failed to download musl cross-compiler"
                exit 1
              fi
              sleep 5
            done
            sudo tar xJf "/tmp/${MUSL_ARCHIVE}" -C /opt
            rm -f "/tmp/${MUSL_ARCHIVE}"
            echo "/opt/aarch64-unknown-linux-musl/bin" >> $GITHUB_PATH
          fi

      - name: Configure linker for musl ARM64
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          mkdir -p .cargo
          printf '[target.aarch64-unknown-linux-musl]\nlinker = "aarch64-linux-musl-gcc"\n' >> .cargo/config.toml

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: |
          BINARY=target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}
          case "${{ matrix.target }}" in
            aarch64-unknown-linux-gnu)
              aarch64-linux-gnu-strip "$BINARY"
              ;;
            aarch64-unknown-linux-musl)
              aarch64-linux-musl-strip "$BINARY"
              ;;
            *-musl)
              strip "$BINARY"
              ;;
            *)
              strip "$BINARY"
              ;;
          esac

      - name: Package
        env:
          ARCHIVE_NAME: ${{ env.BINARY_NAME }}-${{ env.VERSION }}-${{ matrix.target }}.tar.gz
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ env.BINARY_NAME }} dist/
          cp -r example dist/
          tar -czf "${ARCHIVE_NAME}" -C dist ${{ env.BINARY_NAME }} example
          if command -v sha256sum &> /dev/null; then
            sha256sum "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          else
            shasum -a 256 "${ARCHIVE_NAME}" > "${ARCHIVE_NAME}.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.BINARY_NAME }}-${{ env.VERSION }}-${{ matrix.target }}.tar.gz
            ${{ env.BINARY_NAME }}-${{ env.VERSION }}-${{ matrix.target }}.tar.gz.sha256

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
