name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  myrelease:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Test
        run: make test

      - name: Build binaries
        run: |
          make build-release

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            target/*/release/exsocks
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}